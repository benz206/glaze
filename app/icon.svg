<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Glaze">
  <defs>
    <linearGradient id="glazeTile" x1="8" y1="4" x2="56" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9b5de5"/>
      <stop offset="0.5" stop-color="#f15bb5"/>
      <stop offset="1" stop-color="#4361ee"/>
    </linearGradient>
    <linearGradient id="glazeGloss" x1="14" y1="6" x2="40" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="glazeClip"><rect x="3" y="3" width="58" height="58" rx="16"/></clipPath>
    <filter id="glazeShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#170a2b" flood-opacity="0.38"/>
    </filter>
  </defs>

  <!-- gradient tile -->
  <rect x="3" y="3" width="58" height="58" rx="16" fill="url(#glazeTile)"/>
  <!-- glaze sheen -->
  <g clip-path="url(#glazeClip)">
    <ellipse cx="20" cy="4" rx="42" ry="28" fill="url(#glazeGloss)"/>
  </g>

  <!-- code window -->
  <g filter="url(#glazeShadow)">
    <rect x="15" y="18" width="34" height="28" rx="5" fill="#ffffff"/>
  </g>
  <circle cx="21" cy="24" r="1.5" fill="#d4d4dd"/>
  <circle cx="26" cy="24" r="1.5" fill="#d4d4dd"/>
  <circle cx="31" cy="24" r="1.5" fill="#d4d4dd"/>
  <rect x="20" y="30" width="18" height="3" rx="1.5" fill="#9b5de5"/>
  <rect x="20" y="35.5" width="11" height="3" rx="1.5" fill="#f15bb5"/>
  <rect x="20" y="41" width="15" height="3" rx="1.5" fill="#4361ee"/>
</svg>
